<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projects — Anas Ibrahim</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  :root{
    --bg:#0B0C0F;
    --surface:#15171B;
    --surface-2:#1D2025;
    --line:#2A2D33;
    --on:#E8EAED;
    --on-variant:#9AA0A6;
    --primary:#A8C7FA;
    --primary-on:#06204A;
    --mono:'JetBrains Mono', monospace;
    --sans:'Inter', sans-serif;
    --mx:50%; --my:50%;
  }
  *{margin:0; padding:0; box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--bg); color:var(--on); font-family:var(--sans); font-weight:400;
    line-height:1.6; overflow-x:hidden;
  }
  ::selection{background:var(--primary); color:var(--primary-on);}
  a{color:inherit; text-decoration:none;}
  p{color:var(--on-variant);}

  /* ambient glow that drifts with the cursor */
  .glow{
    position:fixed; inset:0; z-index:0; pointer-events:none;
    background:radial-gradient(480px circle at var(--mx) var(--my), rgba(168,199,250,0.06), transparent 70%);
  }

  .magnetic{transition:transform .25s cubic-bezier(.2,.8,.2,1);}

  /* ===== nav: pill ===== */
  nav{position:fixed; top:1.2rem; left:0; right:0; z-index:1000; display:flex; justify-content:center; padding:0 1rem;}
  .pill-nav{
    display:flex; align-items:center; gap:0.2rem; background:rgba(21,23,27,0.75);
    backdrop-filter:blur(16px); border:1px solid var(--line); border-radius:999px; padding:0.4rem 0.5rem 0.4rem 1.1rem;
  }
  .pill-nav .mark{font-size:0.92rem; font-weight:500; margin-right:1.2rem; white-space:nowrap;}
  .pill-nav .mark .dot{color:var(--primary);}
  .pill-nav ul{display:flex; list-style:none; gap:0.1rem;}
  .pill-nav a{
    font-size:0.85rem; color:var(--on-variant); padding:0.55em 1.1em; border-radius:999px; transition:background .2s, color .2s;
  }
  .pill-nav a:hover, .pill-nav a.active{background:var(--surface-2); color:var(--on);}
  @media (max-width:760px){ .pill-nav ul{display:none;} }

  main{position:relative; z-index:1; padding-top:9rem;}
  .container{max-width:1180px; margin:0 auto; padding:0 2rem 6rem;}

  .eyebrow{font-family:var(--mono); font-size:0.78rem; color:var(--primary); letter-spacing:0.04em; margin-bottom:1.2rem;}

  h1, h2{font-weight:350; letter-spacing:-0.01em; line-height:1;}

  .page-header{text-align:center; margin-bottom:3rem;}
  .page-header h1{font-size:clamp(2.4rem, 6vw, 3.4rem); margin-bottom:1rem;}
  .page-header .lead{font-size:1.05rem; max-width:48ch; margin:0 auto;}

  /* fade-rise reveal */
  .rv{opacity:0; transform:translateY(18px); transition:opacity .8s ease, transform .8s ease;}
  .rv.in{opacity:1; transform:translateY(0);}
  .rv-d1.in{transition-delay:.08s;} .rv-d2.in{transition-delay:.16s;} .rv-d3.in{transition-delay:.24s;}

  /* ===== filter pills ===== */
  .filter-container{display:flex; justify-content:center; gap:0.6rem; margin-bottom:3rem; flex-wrap:wrap;}
  .filter-btn{
    font-family:var(--mono); font-size:0.78rem; padding:0.6em 1.3em; border-radius:999px;
    background:var(--surface); border:1px solid var(--line); color:var(--on-variant);
    cursor:pointer; transition:background .2s ease, border-color .2s ease, color .2s ease;
  }
  .filter-btn:hover{border-color:var(--primary); color:var(--on);}
  .filter-btn.active{background:var(--primary); border-color:var(--primary); color:var(--primary-on);}

  /* ===== projects grid ===== */
  .projects-grid{
    display:grid; grid-template-columns:repeat(auto-fill, minmax(330px, 1fr)); gap:1.2rem;
  }
  .project-card{
    border:1px solid var(--line); border-radius:24px; background:var(--surface);
    overflow:hidden; display:flex; flex-direction:column;
    transition:transform .35s ease, border-color .35s ease, background .35s ease;
  }
  .project-card:hover{transform:translateY(-6px); border-color:var(--primary); background:var(--surface-2);}

  .project-image{
    width:100%; height:170px; display:flex; align-items:center; justify-content:center;
    font-size:2.4rem; position:relative; overflow:hidden; background:var(--bg);
    border-bottom:1px solid var(--line);
  }
  .project-image::before{
    content:''; position:absolute; inset:-50%; width:200%; height:200%;
    background:radial-gradient(circle, rgba(168,199,250,0.10) 0%, transparent 70%);
    animation:pulseglow 4s ease-in-out infinite;
  }
  @keyframes pulseglow{
    0%,100%{transform:scale(1); opacity:0.5;}
    50%{transform:scale(1.2); opacity:0.85;}
  }
  .project-image span{position:relative; z-index:1;}

  .project-content{padding:1.6rem; display:flex; flex-direction:column; flex:1;}
  .project-tags{display:flex; flex-wrap:wrap; gap:0.4rem; margin-bottom:1rem;}
  .project-tags .tag{
    font-family:var(--mono); font-size:0.68rem; color:var(--on-variant);
    border:1px solid var(--line); padding:0.3em 0.7em; border-radius:999px;
  }
  .project-content h3{font-weight:500; font-size:1.15rem; margin-bottom:0.6rem;}
  .project-content p{font-size:0.92rem; margin-bottom:1.2rem; flex:1;}

  .project-links{display:flex; gap:0.7rem; margin-top:auto;}
  .project-link{
    font-size:0.82rem; padding:0.6em 1.2em; border-radius:999px; display:inline-flex; align-items:center; gap:0.45em;
    border:1px solid var(--line); color:var(--on); transition:border-color .2s ease, background .2s ease, transform .2s ease;
  }
  .project-link.primary{background:var(--primary); color:var(--primary-on); border-color:var(--primary); font-weight:500;}
  .project-link:hover{transform:translateY(-2px); border-color:var(--primary);}

  @media (max-width:600px){
    .projects-grid{grid-template-columns:1fr;}
  }

  @media (prefers-reduced-motion:reduce){ *{transition:none !important;} .rv{opacity:1 !important; transform:none !important;} }
  a:focus-visible, button:focus-visible{outline:2px solid var(--primary); outline-offset:2px;}
</style>
</head>
<body>

<div class="glow" id="glow"></div>

<nav>
  <div class="pill-nav">
    <span class="mark">Anas<span class="dot">.</span></span>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="index.html#skills">Skills</a></li>
      <li><a href="projects.html" class="active">Work</a></li>
      <li><a href="index.html#experience">Experience</a></li>
      <li><a href="index.html#contact">Contact</a></li>
    </ul>
  </div>
</nav>

<main>
  <div class="container">
    <div class="page-header">
      <div class="eyebrow rv in">FEATURED WORK</div>
      <h1 class="rv in">My Projects</h1>
      <p class="lead rv in rv-d1">A showcase of data analysis projects demonstrating my expertise in transforming data into actionable insights.</p>
    </div>

    <div class="filter-container rv in rv-d2">
      <button class="filter-btn active" data-filter="all">All Projects</button>
      <button class="filter-btn" data-filter="analysis">Data Analysis</button>
      <button class="filter-btn" data-filter="visualization">Visualization</button>
      <button class="filter-btn" data-filter="ml">Machine Learning</button>
      <button class="filter-btn" data-filter="dashboard">Dashboards</button>
    </div>

    <div class="projects-grid rv in rv-d3" id="projectsGrid">
      <!-- Project cards generated by JavaScript -->
    </div>
  </div>
</main>

<script>
  document.addEventListener('mousemove', e=>{
    document.documentElement.style.setProperty('--mx', e.clientX + 'px');
    document.documentElement.style.setProperty('--my', e.clientY + 'px');
  });

  /* magnetic pull on links/buttons */
  document.querySelectorAll('.project-link, .filter-btn').forEach(btn=>{
    btn.classList.add('magnetic');
    btn.addEventListener('mousemove', e=>{
      const r = btn.getBoundingClientRect();
      const x = e.clientX - r.left - r.width/2;
      const y = e.clientY - r.top - r.height/2;
      btn.style.transform = `translate(${x*0.15}px, ${y*0.2}px)`;
    });
    btn.addEventListener('mouseleave', ()=> btn.style.transform = '');
  });

  // Project Data
  const projects = [
    {
        title: 'Consumer Financial Complaints',
        description: 'Interactive Power BI dashboard analyzing company behavior and complaint across multiple regions.',
        tags: ['Power BI', 'SQL'],
        category: ['analysis', 'dashboard', 'visualization'],
        icon: '📊',
        detailsLink: '/projectdetails1',
        demoLink: 'https://app.powerbi.com/view?r=eyJrIjoiYmFiN2ZlNDctYzNkZi00MDBkLTg2MGYtZmJiY2UxOTEwM2U4IiwidCI6IjQ2NTRiNmYxLTBlNDctNDU3OS1hOGExLTAyZmU5ZDk0M2M3YiIsImMiOjl9'
    },
    {
        title: 'Social Media Advertisement - Power BI',
        description: 'Interactive Power BI dashboard analyzing Social Media Trend',
        tags: ['Power BI', 'SQL', 'Excel'],
        category: ['analysis', 'dashboard', 'visualization'],
        icon: '📱',
        detailsLink: '/projectdetails2',
        demoLink: 'https://app.powerbi.com/view?r=YOUR_SOCIAL_MEDIA_LINK_HERE'
    },
    {
        title: 'Social Media Advertisement - Tableau',
        description: 'Interactive Power BI dashboard analyzing Social Media Trend',
        tags: ['Tableau', 'SQL', 'Excel'],
        category: ['analysis', 'dashboard', 'visualization'],
        icon: '📱',
        detailsLink: '/projectdetails3',
    }
  ];

  // Render Projects
  function renderProjects(filter = 'all') {
    const grid = document.getElementById('projectsGrid');
    grid.innerHTML = '';

    const filteredProjects = filter === 'all'
        ? projects
        : projects.filter(p => p.category.includes(filter));

    filteredProjects.forEach((project) => {
        const card = document.createElement('div');
        card.className = 'project-card';

        const demoLinkHtml = project.demoLink
            ? `<a href="${project.demoLink}" class="project-link primary" target="_blank">Live Demo <i class="fas fa-arrow-up-right-from-square" style="font-size:0.7em;"></i></a>`
            : '';

        card.innerHTML = `
            <div class="project-image">
                <span>${project.icon}</span>
            </div>
            <div class="project-content">
                <div class="project-tags">
                    ${project.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                </div>
                <h3>${project.title}</h3>
                <p>${project.description}</p>
                <div class="project-links">
                    <a href="${project.detailsLink}" class="project-link">View Details</a>
                    ${demoLinkHtml}
                </div>
            </div>
        `;

        grid.appendChild(card);

        /* re-apply magnetic effect to newly created links */
        card.querySelectorAll('.project-link').forEach(btn=>{
          btn.classList.add('magnetic');
          btn.addEventListener('mousemove', e=>{
            const r = btn.getBoundingClientRect();
            const x = e.clientX - r.left - r.width/2;
            const y = e.clientY - r.top - r.height/2;
            btn.style.transform = `translate(${x*0.15}px, ${y*0.2}px)`;
          });
          btn.addEventListener('mouseleave', ()=> btn.style.transform = '');
        });
    });
  }

  // Filter Functionality
  const filterBtns = document.querySelectorAll('.filter-btn');
  filterBtns.forEach(btn => {
    btn.addEventListener('click', () => {
        filterBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderProjects(btn.dataset.filter);
    });
  });

  // Initial render
  renderProjects();

  const obs = new IntersectionObserver(entries=>{
    entries.forEach(en=>{ if(en.isIntersecting) en.target.classList.add('in'); });
  }, {threshold:0.1, rootMargin:'0px 0px -40px 0px'});
  document.querySelectorAll('.rv').forEach(el=>obs.observe(el));
</script>

</body>
</html>
